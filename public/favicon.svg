<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <!-- Llama Body Gradient -->
    <linearGradient id="llama" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <!-- Llama Shadow/Accents Gradient -->
    <linearGradient id="snout" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)" />

  <!-- Ears -->
  <path d="M 186 170 Q 186 100 206 70 Q 226 120 236 160 Z" fill="url(#llama)" />
  <path d="M 326 170 Q 326 100 306 70 Q 286 120 276 160 Z" fill="url(#llama)" />
  
  <!-- Ear Inners -->
  <path d="M 196 160 Q 196 110 206 90 Q 218 125 226 155 Z" fill="#FBCFE8" />
  <path d="M 316 160 Q 316 110 306 90 Q 294 125 286 155 Z" fill="#FBCFE8" />

  <!-- Wooly Neck -->
  <!-- M 176 250 -> 146 300, 166 380, 146 450, 176 512 -->
  <path d="M 176 250 Q 146 300 166 380 Q 146 450 176 512 L 336 512 Q 366 450 346 380 Q 366 300 336 250 Z" fill="url(#llama)" />
  
  <!-- Face/Head Base -->
  <rect x="181" y="140" width="150" height="150" rx="75" fill="url(#llama)" />
  
  <!-- Snout Background -->
  <rect x="211" y="220" width="90" height="80" rx="40" fill="url(#snout)" />
  
  <!-- Nose (Heart shape or rounded triangle) -->
  <path d="M 236 235 L 276 235 L 256 255 Z" fill="#312E81" stroke="#312E81" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Mouth -->
  <path d="M 256 255 L 256 270 M 241 275 Q 256 285 271 275" stroke="#312E81" stroke-width="6" stroke-linecap="round" fill="none" />
  
  <!-- Eyes -->
  <circle cx="216" cy="180" r="10" fill="#312E81" />
  <circle cx="296" cy="180" r="10" fill="#312E81" />
  
  <!-- Eye highlights -->
  <circle cx="212" cy="176" r="3" fill="#FFFFFF" />
  <circle cx="292" cy="176" r="3" fill="#FFFFFF" />
  
  <!-- Wool fluffs on head (Cloud effect) -->
  <circle cx="206" cy="140" r="30" fill="url(#llama)" />
  <circle cx="256" cy="120" r="38" fill="url(#llama)" />
  <circle cx="306" cy="140" r="30" fill="url(#llama)" />

  <!-- Optional Cheek Blush -->
  <circle cx="195" cy="210" r="12" fill="#FBCFE8" opacity="0.6" />
  <circle cx="317" cy="210" r="12" fill="#FBCFE8" opacity="0.6" />

</svg>